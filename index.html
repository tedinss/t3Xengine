<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>t3X VM HD Shooter</title>
<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

canvas{
  image-rendering: pixelated;
}

#ui{
  position:absolute;
  top:10px;
  left:10px;
}

button{padding:8px;}
</style>
</head>
<body>

<div id="ui">
<button id="load">Load .t3x</button>
</div>

<canvas id="c"></canvas>

<script>

// ================= RESOLUTION LOCK =================
const BASE_W = 1920;
const BASE_H = 1080;

const c = document.getElementById("c");
const g = c.getContext("2d");

c.width = BASE_W;
c.height = BASE_H;

g.imageSmoothingEnabled = false;

// ================= SCALE =================
function updateScale(){

  let scaleX = innerWidth / BASE_W;
  let scaleY = innerHeight / BASE_H;

  let scale = Math.min(scaleX, scaleY);

  if(scale < 0.1) scale = 0.1;

  c.style.position = "absolute";
  c.style.left = "50%";
  c.style.top = "50%";
  c.style.transformOrigin = "center";

  c.style.transform =
    "translate(-50%,-50%) scale(" + scale + ")";
}

window.onresize = updateScale;
updateScale();

// ================= STATE =================
let E={},V={},BC=[],K={},CD={},GRAVITY=false;

window.onkeydown=e=>{
  let k=e.key.toLowerCase();
  if(k===" ") k="space";
  K[k]=true;
};

window.onkeyup=e=>{
  let k=e.key.toLowerCase();
  if(k===" ") k="space";
  K[k]=false;
};

const key=k=>K[k];

// ================= FILE =================
let input=document.createElement("input");
input.type="file";
input.accept=".t3x";
input.style.display="none";
document.body.appendChild(input);

document.getElementById("load").onclick=()=>input.click();

input.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>{
    compile(ev.target.result);
    document.getElementById("ui").style.display = "none";
  };
  r.readAsText(e.target.files[0]);
};

// ================= COMPILER =================
function compile(src){

  E={};V={};BC=[];CD={};
  GRAVITY = false;

  let lines=src.split("\n").map(x=>x.trim()).filter(Boolean);

  for(let l of lines){
    let parts = l.split(",");
    BC.push(parts);
    if(parts[0]==="world" && parts[1]==="gravity") GRAVITY = true;
  }

  build();
}

// ================= BUILD =================
function build(){
  for(let i of BC){
    if(i[0]==="v"){
      V[i[1]]=+i[2];
    }
  }

  for(let i of BC){
    if(i[0]==="p"||i[0]==="e"||i[0]==="g"){
      let initialHp = 100;
      if(i[0]==="e" && V["enemy_hp"] !== undefined) initialHp = V["enemy_hp"];
      if(i[0]==="p" && V["hp"] !== undefined) initialHp = V["hp"];

      E[i[0]+Math.random()]={
        id:i[0],
        x:+i[1],y:+i[2],
        w:+i[3],h:+i[4],
        c:i[5],
        hp:initialHp,
        vy:0
      };
    }
  }
}

// ================= PHYSICS =================
function physics(){
  for(let id in E){
    let e=E[id];

    if(e.id==="p" || e.id==="e"){
      
      if(GRAVITY){
        e.onGround = false;
        e.vy += 0.4;
        e.y += e.vy;
      }

      // COLLISION WITH 'g' (Ground/Walls)
      for(let id2 in E){
        let g=E[id2];
        if(g.id==="g"){
          if(e.x < g.x+g.w && e.x+e.w > g.x && e.y+e.h > g.y && e.y < g.y+g.h){
            
            if(GRAVITY){
              e.y = g.y - e.h;
              e.vy = 0;
              e.onGround = true;
            } else {
              // TOP DOWN COLLISION (Push out)
              let dx = (e.x + e.w/2) - (g.x + g.w/2);
              let dy = (e.y + e.h/2) - (g.y + g.h/2);
              if(Math.abs(dx) > Math.abs(dy)){
                if(dx > 0) e.x = g.x + g.w;
                else e.x = g.x - e.w;
              } else {
                if(dy > 0) e.y = g.y + g.h;
                else e.y = g.y - e.h;
              }
            }
          }
        }
      }

      // PLAYER-ENEMY COLLISION
      if(e.id==="p"){
        for(let id2 in E){
          let en=E[id2];
          if(en.id==="e"){
            if(e.x < en.x+en.w && e.x+e.w > en.x && e.y+e.h > en.y && e.y < en.y+en.h){
              if(!e.invuln){
                if(V["hp"] !== undefined) V["hp"]--;
                e.invuln = 30;
              }
            }
          }
        }
        if(e.invuln > 0) e.invuln--;
      }
    }
  }
}

// ================= BULLETS =================
function bullets(){
  for(let id in E){
    if(id.startsWith("b")){
      let b=E[id];

      b.x+=b.vx;
      b.y+=b.vy;
      b.life--;

      if(b.life<=0) delete E[id];

      for(let eId in E){
        let e=E[eId];

        if(e.id==="e"){
          if(b.x < e.x+e.w &&
             b.x+b.w > e.x &&
             b.y < e.y+e.h &&
             b.y+b.h > e.y){

            // TRIGGER HIT EVENT
            trigger("hit", eId);
            
            let dmg = V["bullet_damage"] !== undefined ? V["bullet_damage"] : 1;
            e.hp -= dmg;
            delete E[id];

            if(e.hp<=0) delete E[eId];
          }
        }
      }
    }
  }
}

// ================= VM =================
function run(){

  for(let i of BC){

    // MOVE
    if(i[0]==="c"){
      for(let id in E){
        if(E[id].id===i[1]){
          let s=+i[3];

          if(key("a")){ E[id].x-=s; E[id].facing="left"; }
          if(key("d")){ E[id].x+=s; E[id].facing="right"; }

          if(GRAVITY){
            if(key("w") && E[id].onGround) E[id].vy = -18;
          } else {
            if(key("w"))E[id].y-=s;
            if(key("s"))E[id].y+=s;
          }
        }
      }
    }

    // AI
    if(i[0]==="a"){
      let A=null,B=null;

      for(let id in E){
        if(E[id].id===i[1])A=E[id];
        if(E[id].id===i[2])B=E[id];
      }

      if(A&&B){
        let s=+i[3];

        if(A.x<B.x){ A.x+=s; A.facing="right"; }
        if(A.x>B.x){ A.x-=s; A.facing="left"; }
        if(A.y<B.y)A.y+=s;
        if(A.y>B.y)A.y-=s;
      }
    }

    // SHOOT SYSTEM (Directional + Auto)
    if(i[0]==="s"){
      for(let id in E){
        if(E[id].id===i[1]){
          let dir = i[2];
          let speed = +i[3];
          let vx=0, vy=0;

          if(dir==="auto"){
            if(!CD[id])CD[id]=0;
            if(CD[id]<=0){
              vx = E[id].facing === "left" ? -speed : speed;
            }
          } else {
            if(dir==="left" && key("arrowleft")){ vx=-speed; E[id].facing="left"; }
            if(dir==="right" && key("arrowright")){ vx=speed; E[id].facing="right"; }
            if(dir==="up" && key("arrowup")) vy=-speed;
            if(dir==="down" && key("arrowdown")) vy=speed;
          }

          if(vx!==0 || vy!==0){
            if(!CD[id])CD[id]=0;
            if(CD[id]>0) continue;

            let b="b"+Math.random();
            E[b]={
              x:E[id].x + E[id].w/2 - 3,
              y:E[id].y + E[id].h/2 - 3,
              w:8,h:8,
              vx:vx,
              vy:vy,
              life:100,
              c:"#0ff"
            };
            CD[id]=20;
          }
        }
      }
    }
  }

  for(let k in CD) CD[k]--;
}

// ================= LOGIC =================
function trigger(event, targetId){
  for(let i of BC){
    let line = i.join(",");
    if(line.startsWith("f " + event)){
      // Handle simple actions like variable decrement
      if(line.includes("hp--")) V["hp"]--;
      if(line.includes("enemy_hp--")) V["enemy_hp"]--;
    }
  }
}

function checkRules(){
  for(let i of BC){
    if(i[0]==="if"){
      let cond = i[1]; // e.g. "hp <= 0"
      let action = i[2]; // e.g. "reset"

      let parts = cond.split(" ");
      let varName = parts[0];
      let op = parts[1];
      let val = +parts[2];

      let triggered = false;
      if(op==="<=" && V[varName] <= val) triggered = true;
      if(op==="==" && V[varName] == val) triggered = true;

      if(triggered){
        if(action==="reset") location.reload();
        if(action==="remove") {
           // simple removal logic
        }
      }
    }
  }
}

// ================= RENDER =================
function render(){
  g.clearRect(0,0,c.width,c.height);

  // UI / Variables
  g.fillStyle="white";
  g.font = "30px Arial";
  let offset = 40;
  for(let v in V){
    g.fillText(v + ": " + V[v], 20, offset);
    offset += 40;
  }

  for(let id in E){
    let e=E[id];

    g.fillStyle=e.c;
    g.fillRect(e.x,e.y,e.w,e.h);

    if(e.hp!==undefined && e.id !== "g"){
      g.fillStyle="#fff";
      g.font = "14px Arial";
      g.fillText(e.hp,e.x,e.y-5);
    }
  }
}

// ================= LOOP =================
function loop(){
  run();
  physics();
  bullets();
  checkRules();
  render();
  requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
